name: Release

on:
  push:
    branches: ["main"]

permissions: read-all

jobs:
  release-please:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.BAZEL_DIFF_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BAZEL_DIFF_RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.pr }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        if: ${{ steps.release.outputs.pr }}
        with:
          cache: "npm"
          node-version: "24.x"

      - name: Format release PR
        if: ${{ steps.release.outputs.pr }}
        run: |
          npm ci
          npx prettier -w .
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -u
            git commit -m "chore: format release PR"
            git push
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          cache: "npm"
          node-version: "24.x"

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/index.js

      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag -f v${{ steps.release.outputs.major }}
          git push origin v${{ steps.release.outputs.major }} --force
