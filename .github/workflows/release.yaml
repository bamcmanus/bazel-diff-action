name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.BAZEL_DIFF_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.BAZEL_DIFF_RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          cache: "npm"
          node-version: "24.x"

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2.4.0
        with:
          subject-path: dist/index.js

      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag -f v${{ steps.release.outputs.major }}
          git push origin v${{ steps.release.outputs.major }} --force
