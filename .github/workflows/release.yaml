name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.BAZEL_DIFF_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BAZEL_DIFF_RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.pr }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.pr }}
        with:
          cache: "npm"
          node-version: "24.x"

      - name: Format release PR
        if: ${{ steps.release.outputs.pr }}
        run: |
          npm ci
          npx prettier -w .
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: format release PR"
            git push
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          cache: "npm"
          node-version: "24.x"

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.4.0
        with:
          subject-path: dist/index.js

      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag -f v${{ steps.release.outputs.major }}
          git push origin v${{ steps.release.outputs.major }} --force
